6045,590.75,335.6045,586.75,339.6045" style="stroke: #A80036; stroke-width: 1.0;"/><line style="stroke: #A80036; stroke-width: 1.5;" x1="586.75" x2="586.75" y1="379.5732" y2="385.5732"/><line style="stroke: #A80036; stroke-width: 1.5;" x1="586.75" x2="244.5" y1="385.5732" y2="385.5732"/><line style="stroke: #A80036; stroke-width: 1.5;" x1="244.5" x2="244.5" y1="385.5732" y2="399.5732"/><polygon fill="#A80036" points="240.5,389.5732,244.5,399.5732,248.5,389.5732,244.5,393.5732" style="stroke: #A80036; stroke-width: 1.0;"/><text fill="#000000" font-family="sans-serif" font-size="18" lengthAdjust="spacingAndGlyphs" textLength="63" x="137" y="29.4531">Cliente</text><text fill="#000000" font-family="sans-serif" font-size="18" lengthAdjust="spacingAndGlyphs" textLength="59" x="457.125" y="29.4531">Ventas</text><text fill="#000000" font-family="sans-serif" font-size="18" lengthAdjust="spacingAndGlyphs" textLength="75" x="670.75" y="29.4531">Almacén</text><line style="stroke: #000000; stroke-width: 2.0;" x1="10" x2="10" y1="12.7451" y2="499.542"/><line style="stroke: #000000; stroke-width: 2.0;" x1="323" x2="323" y1="12.7451" y2="499.542"/><line style="stroke: #000000; stroke-width: 2.0;" x1="651.25" x2="651.25" y1="12.7451" y2="499.542"/><line style="stroke: #000000; stroke-width: 2.0;" x1="770.25" x2="770.25" y1="12.7451" y2="499.542"/><!--
@startuml
	|Cliente|
		start
		:Solicitar producto;
	|Ventas|
		:Procesar pedido;
if () then ([No disponible])
		:Notificar problema al cliente;
		stop
else ([Disponible])
	|Almacén|
		:Enviar pedido;
endif
fork
	|Cliente|
		:Recibir producto;
fork again
	|Ventas|
		:Facturar cliente;
end fork
	|Cliente|
		:Pagar factura;
		stop
@enduml

